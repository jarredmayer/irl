name: Scheduled Scrape

on:
  schedule:
    # Run twice daily: 6 AM EST (11 AM UTC) and 6 PM EST (11 PM UTC)
    - cron: '0 11 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write   # push event data to main
  actions: write    # dispatch deploy.yml after successful scrape

concurrency:
  group: "scrape-pipeline"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Cache Puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('scraper/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Install scraper dependencies
        working-directory: scraper
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci

      - name: Install Puppeteer Chrome
        working-directory: scraper
        run: npx puppeteer browsers install chrome || echo "⚠ Chrome install failed — Puppeteer scrapers will be skipped"

      - name: Run Instagram post scraper
        if: ${{ secrets.INSTAGRAM_SESSION_ID != '' && secrets.ANTHROPIC_API_KEY != '' }}
        continue-on-error: true
        working-directory: scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_SESSION_ID: ${{ secrets.INSTAGRAM_SESSION_ID }}
        run: npm run scrape:ig

      - name: Run scraper
        continue-on-error: true
        working-directory: scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run scrape

      - name: Commit and push event data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/events*.json src/data/scrape-meta.json src/data/instagram-posts-cache.json src/data/venue-images.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
            exit 0
          fi
          git commit -m "Update events data $(date +'%Y-%m-%d')"
          # Rebase on latest main — use -X theirs so fresh scrape data wins any conflicts
          # with concurrent auto-merge commits (retry up to 3 times on push failure)
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && break
            echo "Push failed (attempt $i) — retrying in 5s..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done

      - name: Trigger deploy
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Deploy triggered on main"
