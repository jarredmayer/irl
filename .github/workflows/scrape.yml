name: Scheduled Scrape

on:
  schedule:
    # Run 4x daily: 6 AM, 12 PM, 6 PM, 12 AM EST
    - cron: '0 11 * * *'
    - cron: '0 17 * * *'
    - cron: '0 23 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger
  # GitHub registers checks for ALL workflow files on a pushed branch.
  # Without these triggers, the check is "expected" but never runs → red X.
  # Adding them lets the 'check-ok' job run and pass → green check.
  push:
    branches: ['claude/**', main, master]
  pull_request:

permissions:
  contents: write   # push event data to main
  actions: write    # dispatch deploy.yml after successful scrape

jobs:
  # Always-pass job so GitHub check never shows "No jobs were run"
  check-ok:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Scrape workflow registered — actual scrape runs on schedule/dispatch"

  scrape:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: "scrape-pipeline"
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Cache Puppeteer Chrome
        id: puppeteer-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-v2-${{ hashFiles('scraper/package-lock.json') }}

      - name: Install scraper dependencies
        working-directory: scraper
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci || (echo "npm ci failed, retrying..." && npm cache clean --force && npm ci) || echo "npm ci failed — scrapers will be skipped"

      - name: Install Puppeteer Chrome
        continue-on-error: true
        working-directory: scraper
        run: |
          npx puppeteer browsers install chrome || echo "Chrome install failed — Puppeteer scrapers will return empty"
          CHROME_PATH=$(find ~/.cache/puppeteer -name "chrome" -type f -perm -u+x 2>/dev/null | head -1)
          if [ -n "$CHROME_PATH" ]; then
            echo "Chrome installed at: $CHROME_PATH"
          else
            echo "Chrome not found — Puppeteer scrapers will return empty arrays"
          fi

      - name: Run Instagram post scraper
        continue-on-error: true
        timeout-minutes: 5
        working-directory: scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_SESSION_ID: ${{ secrets.INSTAGRAM_SESSION_ID }}
        run: |
          if [ -z "$INSTAGRAM_SESSION_ID" ] || [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "Skipping Instagram scraper: secrets not configured"
            exit 0
          fi
          npm run scrape:ig

      - name: Run scraper
        continue-on-error: true
        timeout-minutes: 10
        working-directory: scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: npm run scrape

      - name: Commit and push event data
        continue-on-error: true
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/events*.json public/data/scrape-meta.json \
                  public/data/instagram-posts-cache.json public/data/venue-images.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
            exit 0
          fi
          git commit -m "Update events data $(date +'%Y-%m-%d')"
          PUSH_OK=false
          for i in 1 2 3; do
            echo "Push attempt $i/3..."
            if git pull --rebase -X theirs origin main; then
              if git push; then
                echo "Pushed successfully on attempt $i"
                PUSH_OK=true
                break
              fi
              echo "git push failed on attempt $i"
            else
              echo "git pull --rebase failed on attempt $i"
              git rebase --abort 2>/dev/null || true
            fi
            [ "$i" -lt 3 ] && sleep 5 || true
          done
          $PUSH_OK && echo "Data pushed" || echo "Push failed — will retry next scheduled run"

      - name: Trigger deploy
        continue-on-error: true
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Deploy triggered on main"
