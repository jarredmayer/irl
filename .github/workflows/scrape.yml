name: Scheduled Scrape

on:
  schedule:
    # Run twice daily: 6 AM EST (11 AM UTC) and 6 PM EST (11 PM UTC)
    - cron: '0 11 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger
  # Handle PR check-runs gracefully (skip instead of fail)
  pull_request:

permissions:
  contents: write   # push event data to main
  actions: write    # dispatch deploy.yml after successful scrape

concurrency:
  group: "scrape-pipeline"
  cancel-in-progress: false

jobs:
  scrape:
    # Only run on schedule or manual trigger — skip cleanly on PR events
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Cache Puppeteer Chrome
        id: puppeteer-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-v2-${{ hashFiles('scraper/package-lock.json') }}

      - name: Install scraper dependencies
        working-directory: scraper
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci || (echo "⚠ npm ci failed on first attempt, retrying..." && npm cache clean --force && npm ci) || echo "⚠ npm ci failed after retry — scrapers will be skipped this run"

      - name: Install Puppeteer Chrome
        continue-on-error: true
        working-directory: scraper
        run: |
          npx puppeteer browsers install chrome
          # Verify Chrome is actually executable
          CHROME_PATH=$(find ~/.cache/puppeteer -name "chrome" -type f -perm -u+x 2>/dev/null | head -1)
          if [ -n "$CHROME_PATH" ]; then
            echo "✅ Chrome installed at: $CHROME_PATH"
            echo "   Version: $($CHROME_PATH --version 2>/dev/null || echo 'unknown')"
          else
            echo "⚠ Chrome binary not found — Puppeteer scrapers will return empty"
          fi

      - name: Run Instagram post scraper
        if: ${{ secrets.INSTAGRAM_SESSION_ID != '' && secrets.ANTHROPIC_API_KEY != '' }}
        continue-on-error: true
        timeout-minutes: 5
        working-directory: scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_SESSION_ID: ${{ secrets.INSTAGRAM_SESSION_ID }}
        run: npm run scrape:ig

      - name: Run scraper
        continue-on-error: true
        timeout-minutes: 10
        working-directory: scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: npm run scrape

      - name: Commit and push event data
        continue-on-error: true
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/events*.json public/data/scrape-meta.json \
                  public/data/instagram-posts-cache.json public/data/venue-images.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
            exit 0
          fi
          git commit -m "Update events data $(date +'%Y-%m-%d')"
          PUSH_OK=false
          for i in 1 2 3; do
            echo "Push attempt $i/3..."
            if git pull --rebase -X theirs origin main; then
              if git push; then
                echo "Pushed successfully on attempt $i"
                PUSH_OK=true
                break
              fi
              echo "git push failed on attempt $i"
            else
              echo "git pull --rebase failed on attempt $i"
              git rebase --abort 2>/dev/null || true
            fi
            [ "$i" -lt 3 ] && sleep 5 || true
          done
          $PUSH_OK && echo "✅ Data pushed" || echo "⚠️  Push failed after 3 attempts — will retry next scheduled run"

      - name: Trigger deploy
        continue-on-error: true
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Deploy triggered on main"
